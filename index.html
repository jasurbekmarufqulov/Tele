<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Toad - Nahang Hujumi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #050b14;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }

        .game-container {
            background-color: #0f1926;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #1d2d44;
        }

        /* KOEFFITSIYENTLAR TARIXI */
        .history-container {
            display: flex;
            gap: 6px;
            background-color: #03070d;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            min-height: 38px;
        }

        .history-item {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
        }
        .coef-low { background-color: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; }
        .coef-high { background-color: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid #f1c40f; }

        .center-multiplier {
            position: absolute;
            top: 15px;
            font-size: 38px;
            font-weight: bold;
            color: #fff;
            z-index: 10;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        /* KO'K SUV HUDUDI */
        .display-area {
            background: linear-gradient(to bottom, #0a2540, #114066, #1b6ca8, #3a9ad9); 
            height: 320px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid #235e8f;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
        }

        /* ORQA FONDA SUZUVCHI BALIQCHALAR */
        .fish {
            position: absolute;
            font-size: 18px;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }

        .fish-left {
            animation: swimLeftToRight 8s linear infinite;
        }

        .fish-right {
            animation: swimRightToLeft 10s linear infinite;
        }

        @keyframes swimLeftToRight {
            0% { left: -40px; transform: scaleX(1); }
            100% { left: 100%; transform: scaleX(1); }
        }

        @keyframes swimRightToLeft {
            0% { right: -40px; transform: scaleX(-1); }
            100% { right: 100%; transform: scaleX(-1); }
        }

        /* TOSHLAR KONTEYNERI */
        .stones-container {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* JIGARRANG TOSHLAR */
        .stone-node {
            position: absolute;
            width: 90px;
            height: 52px;
            background: linear-gradient(135deg, #8b5a2b 0%, #5c3a21 100%);
            border-radius: 40% 40% 50% 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px solid #a06d3b;
            box-shadow: 0 8px 14px rgba(0,0,0,0.6), inset 0 4px 6px rgba(255,255,255,0.2);
            left: calc(50% - 45px); 
            transition: transform 0.2s, background 0.3s;
        }

        .stone-node.active {
            background: linear-gradient(135deg, #b07d4f 0%, #784b2c 100%);
            border-color: #e5a96f;
            box-shadow: 0 0 20px rgba(229,169,111,0.6), 0 8px 14px rgba(0,0,0,0.6);
        }

        .stone-coef {
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }

        /* BAQACHA */
        .frog-player {
            position: absolute;
            font-size: 45px;
            z-index: 5;
            left: calc(50% - 22.5px);
            bottom: 22px; 
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.2s;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
        }

        /* DAXSHATLI NAHANG (SHARK) */
        .shark-enemy {
            position: absolute;
            font-size: 65px;
            z-index: 6; /* Baqachaning ustidan chiqadi */
            left: calc(50% - 32.5px);
            bottom: -100px; /* O'yin paytida ko'rinmaydi, pastda turadi */
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.7));
            pointer-events: none;
        }

        .status-text {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            color: #ff453a;
            display: none;
            z-index: 11;
            top: 45%;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            text-align: center;
        }

        /* BOSHQARUV PANELI */
        .control-panel { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #14243b;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid #20395e;
        }

        .deposit-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .balance-text span, .win-text span { color: #3498db; font-weight: bold; }

        .btn { width: 100%; padding: 14px; font-size: 17px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-start { background-color: #3498db; color: white; box-shadow: 0 4px 15px rgba(52,152,219,0.3); }
        .btn-cashout { background-color: #f1c40f; color: black; display: none; box-shadow: 0 4px 15px rgba(241,196,15,0.3); }

        /* JONLI ISHTIROKCHILAR */
        .players-panel {
            background-color: #0f1926;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1d2d44;
        }

        .panel-title {
            font-size: 12px;
            font-weight: bold;
            color: #708aa6;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .players-list { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
        
        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #060c14; padding: 8px 12px; border-radius: 6px; font-size: 12px;
        }
        .player-row.cashed-out { background-color: rgba(46, 204, 113, 0.12); border: 1px solid #2ecc71; }
        .player-name { font-weight: bold; color: #fff; }
        .player-bet { color: #ffb302; }
        .player-win { color: #2ecc71; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="game-container">
            <div class="history-container" id="historyBox">
                <div class="history-item coef-low">1.65x</div>
                <div class="history-item coef-high">4.20x</div>
            </div>

            <!-- JONLI KO'K MAYDON -->
            <div class="display-area" id="displayArea">
                <!-- Baliqchalar (Avtomatik suzib yuradi) -->
                <div class="fish fish-left" style="top: 40px;">🐟</div>
                <div class="fish fish-right" style="top: 100px;">🐠</div>
                <div class="fish fish-left" style="top: 180px;">🐡</div>
                <div class="fish fish-right" style="top: 240px;">✨🐠</div>

                <div class="center-multiplier" id="multiplierText">1.00x</div>
                <div class="status-text" id="statusText">NAHANG HUJUMI! 🦈☠️</div>
                
                <div class="stones-container" id="stonesContainer"></div>
                <div class="frog-player" id="frogPlayer">🐸</div>
                
                <!-- Maxfiy Nahang Balig'i -->
                <div class="shark-enemy" id="sharkEnemy">🦈</div>
            </div>

            <div class="control-panel">
                <div class="status-bar">
                    <div class="balance-text">
                        <button class="deposit-btn" onclick="refillBalance()">Balans (+)</button> <br>
                        Balans: <span id="balanceVal">5000</span> UZS
                    </div>
                    <div class="win-text">Yutuq: <span id="winVal">0</span> UZS</div>
                </div>
                <button class="btn btn-start" id="mainBtn" onclick="startRound()">TIKISH (1000 UZS)</button>
            </div>
        </div>

        <div class="players-panel">
            <div class="panel-title">
                <span>Jonli Sakrashlar</span>
                <span id="activeCountLabel">Faol: --</span>
            </div>
            <div class="players-list" id="playersList"></div>
        </div>

    </div>

    <script>
        let balance = 5000;
        let currentMultiplier = 1.00;
        let gameLoopInterval;
        let crashMultiplier;
        let isPlaying = false;
        const betAmount = 1000;
        
        let currentStep = 0;
        let totalSteps = 40; 
        let stoneStepsData = []; 

        const sampleNames = ["Jasur_07", "Sardor_A", "Muzaffar", "Bekzod", "Anvar_99", "Diyor_94", "Bobur_Uz", "Lazizbek"];
        let activePlayers = [];

        const multiplierText = document.getElementById('multiplierText');
        const statusText = document.getElementById('statusText');
        const frogPlayer = document.getElementById('frogPlayer');
        const sharkEnemy = document.getElementById('sharkEnemy');
        const stonesContainer = document.getElementById('stonesContainer');
        const mainBtn = document.getElementById('mainBtn');
        const balanceVal = document.getElementById('balanceVal');
        const winVal = document.getElementById('winVal');
        const historyBox = document.getElementById('historyBox');
        const playersList = document.getElementById('playersList');
        const activeCountLabel = document.getElementById('activeCountLabel');

        function refillBalance() {
            balance += 5000;
            balanceVal.innerText = balance;
        }

        function generateCrashPoint() {
            let rand = Math.random();
            if (rand < 0.15) return parseFloat((1.00 + Math.random() * 0.12).toFixed(2));
            if (rand < 0.70) return parseFloat((1.15 + Math.random() * 2.2).toFixed(2));
            return parseFloat((3.50 + Math.random() * 15.00).toFixed(2));
        }

        function generateStonesPattern() {
            stonesContainer.innerHTML = "";
            stoneStepsData = [];
            let coef = 1.00;
            stoneStepsData.push(1.00);
            
            for (let i = 1; i <= totalSteps; i++) {
                coef += parseFloat((0.06 + (i * 0.008)).toFixed(2));
                stoneStepsData.push(parseFloat(coef.toFixed(2)));
            }

            stoneStepsData.forEach((val, index) => {
                let stone = document.createElement('div');
                stone.className = "stone-node";
                stone.id = `stone_${index}`;
                stone.style.bottom = (index * 78) + 32 + "px"; 
                stone.innerHTML = `<span class="stone-coef">${val.toFixed(2)}x</span>`;
                stonesContainer.appendChild(stone);
            });
            
            document.getElementById('stone_0').className = "stone-node active";
        }

        function renderPlayersList() {
            playersList.innerHTML = "";
            let livingCount = 0;

            activePlayers.forEach(p => {
                if (!p.cashedOut) livingCount++;
                let rowClass = p.cashedOut ? "player-row cashed-out" : "player-row";
                let betDisplay = p.cashedOut ? `${p.target.toFixed(2)}x` : `${p.bet} UZS`;
                let winDisplay = p.cashedOut ? `block` : `none`;
                let totalWin = Math.round(p.bet * p.target);

                playersList.innerHTML += `
                    <div class="${rowClass}">
                        <span class="player-name">${p.name}</span>
                        <span class="player-bet">${betDisplay}</span>
                        <span class="player-win" style="display: ${winDisplay}">+${totalWin} UZS</span>
                    </div>
                `;
            });

            let dynamicActiveNumber = livingCount + Math.floor(Math.random() * 8 + 5);
            activeCountLabel.innerText = "Faol: " + dynamicActiveNumber;
        }

        function setupLivePlayers() {
            activePlayers = [];
            let shuffled = sampleNames.sort(() => 0.5 - Math.random()).slice(0, 5);
            shuffled.forEach((name) => {
                let pBet = Math.floor(Math.random() * 2 + 1) * 2000;
                let pTarget = parseFloat((1.15 + Math.random() * 3.5).toFixed(2));
                activePlayers.push({ name: name, bet: pBet, target: pTarget, cashedOut: false });
            });
            renderPlayersList();
        }

        function startRound() {
            if (isPlaying) return;
            if (balance < betAmount) { alert("Mablag' yetarli emas!"); return; }

            balance -= betAmount;
            balanceVal.innerText = balance;
            isPlaying = true;
            currentStep = 0;
            currentMultiplier = 1.00;
            crashMultiplier = generateCrashPoint();

            generateStonesPattern(); 
            setupLivePlayers();

            statusText.style.display = 'none';
            multiplierText.style.display = 'block';
            multiplierText.innerText = "1.00x";
            multiplierText.style.color = "white";
            
            // Elementlarni boshlang'ich joyiga qaytarish
            sharkEnemy.style.bottom = "-100px"; 
            stonesContainer.style.transform = "translateY(0px)";
            frogPlayer.style.display = "block";
            frogPlayer.style.bottom = "34px"; 
            frogPlayer.style.transform = "scale(1)";

            mainBtn.innerText = "CASH OUT (0 UZS)";
            mainBtn.className = "btn btn-cashout";
            mainBtn.style.display = "block";
            mainBtn.setAttribute("onclick", "cashOut()");

            gameLoopInterval = setInterval(() => {
                let nextStep = currentStep + 1;
                let nextMultiplier = stoneStepsData[nextStep];

                if (nextMultiplier >= crashMultiplier) {
                    clearInterval(gameLoopInterval);
                    endRound(false);
                    return;
                }

                currentStep = nextStep;
                currentMultiplier = nextMultiplier;
                
                multiplierText.innerText = currentMultiplier.toFixed(2) + "x";
                document.getElementById(`stone_${currentStep}`).className = "stone-node active";

                // Sakrash animatsiyasi
                frogPlayer.style.transform = "scaleY(1.3) scaleX(0.85)";
                setTimeout(() => { frogPlayer.style.transform = "scale(1)"; }, 150);

                if (currentStep >= 1) {
                    let offset = currentStep * 78;
                    stonesContainer.style.transform = `translateY(${offset}px)`;
                }

                let currentWin = Math.round(betAmount * currentMultiplier);
                mainBtn.innerText = `CASH OUT (${currentWin} UZS)`;

                let listChanged = false;
                activePlayers.forEach(p => {
                    if (!p.cashedOut && currentMultiplier >= p.target) {
                        p.cashedOut = true;
                        listChanged = true;
                    }
                });

                if (listChanged || Math.random() < 0.3) {
                    renderPlayersList();
                }

            }, 850); 
        }

        function cashOut() { 
            if (!isPlaying) return; 
            clearInterval(gameLoopInterval);
            endRound(true); 
        }

        function addResultToHistory(finalCoef) {
            const newItem = document.createElement('div');
            newItem.innerText = finalCoef.toFixed(2) + "x";
            newItem.className = finalCoef >= 2.00 ? "history-item coef-high" : "history-item coef-low";
            historyBox.insertBefore(newItem, historyBox.firstChild);
            if (historyBox.children.length > 5) historyBox.removeChild(historyBox.lastChild);
        }

        function endRound(isWin) {
            isPlaying = false;
            addResultToHistory(currentMultiplier);

            if (isWin) {
                let winAmount = Math.round(betAmount * currentMultiplier);
                balance += winAmount; 
                balanceVal.innerText = balance; 
                winVal.innerText = winAmount;
                multiplierText.style.color = '#2ecc71';
            } else {
                // NAHANG HUJUMI EFFEKTI: Nahang pastdan otilib chiqadi
                let frogCurrentBottom = frogPlayer.style.bottom;
                sharkEnemy.style.bottom = "25%"; // Markazga otilib chiqadi
                
                setTimeout(() => {
                    frogPlayer.style.transform = "scale(0) rotate(180deg)"; // Baqacha yeyiladi
                    setTimeout(() => { frogPlayer.style.display = 'none'; }, 150);
                }, 200);
                
                multiplierText.style.display = 'none'; 
                statusText.style.display = 'block'; 
                winVal.innerText = 0;
            }

            activeCountLabel.innerText = "Faol: " + Math.floor(Math.random() * 5 + 2);

            setTimeout(() => {
                mainBtn.innerText = `TIKISH (${betAmount} UZS)`;
                mainBtn.className = "btn btn-start";
                mainBtn.setAttribute("onclick", "startRound()");
            }, 1500); // Nahang animatsiyasi uchun vaqt biroz uzaytirildi
        }

        window.onload = function() {
            generateStonesPattern();
            activeCountLabel.innerText = "Faol: " + Math.floor(Math.random() * 6 + 4);
        };
    </script>
</body>
</html>
